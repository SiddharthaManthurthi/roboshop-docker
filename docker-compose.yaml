services:
  catalogue:
    build: 
      dockerfile: catalogue/Dockerfile
    image: joindevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: joindevops/user:1.0.0
    container_name: user
    depends_on:
    - redis
    - mongodb
  
  mongodb:
    build: 
      dockerfile: mongodb/Dockerfile
    image: joindevops/mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually